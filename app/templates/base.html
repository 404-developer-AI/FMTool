<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FMTool{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="{{ url_for('main.index') }}">FMTool</a>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('main.index') }}" class="{% if request.endpoint == 'main.index' or (request.endpoint and request.endpoint.startswith('overview.')) %}active{% endif %}">Dashboard</a></li>
            <li><a href="{{ url_for('migrate.migrate_aliases') }}" class="{% if request.endpoint and request.endpoint.startswith('migrate.') %}active{% endif %}">Migrate</a></li>
            <li><a href="{{ url_for('sophos.sophos_page') }}" class="{% if request.endpoint and request.endpoint.startswith('sophos.') %}active{% endif %}">Sophos</a></li>
            <li><a href="{{ url_for('upload.upload_page') }}" class="{% if request.endpoint and request.endpoint.startswith('upload.') %}active{% endif %}">Import</a></li>
            <li><a href="{{ url_for('activity_log.activity_log_page') }}" class="{% if request.endpoint and request.endpoint.startswith('activity_log.') %}active{% endif %}">Activity Log</a></li>
            <li><a href="{{ url_for('settings.report_settings_page') }}" class="{% if request.endpoint and request.endpoint.startswith('settings.') %}active{% endif %}">Settings</a></li>
        </ul>
    </nav>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
